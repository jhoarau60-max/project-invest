<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Nettoyage du cache...</title>
<style>
  body { background:#0a1628; color:#fff; font-family:Arial,sans-serif; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; margin:0; }
  h2 { color:#00c8ff; }
  p { color:#aaa; }
  .bar { width:300px; height:8px; background:#1a2a3a; border-radius:4px; margin:20px 0; overflow:hidden; }
  .fill { height:100%; background:#00c8ff; border-radius:4px; animation:grow 3s linear forwards; }
  @keyframes grow { from{width:0%} to{width:100%} }
</style>
</head>
<body>
<h2>Nettoyage en cours...</h2>
<div class="bar"><div class="fill"></div></div>
<p id="msg">Suppression du cache et des anciens service workers...</p>
<script>
(async function() {
  var msg = document.getElementById('msg');

  // 1. Désinscrire tous les service workers
  if ('serviceWorker' in navigator) {
    var regs = await navigator.serviceWorker.getRegistrations();
    for (var r of regs) { await r.unregister(); }
    msg.textContent = 'Service workers supprimés...';
  }

  // 2. Vider tous les caches
  if ('caches' in window) {
    var keys = await caches.keys();
    for (var k of keys) { await caches.delete(k); }
    msg.textContent = 'Caches vidés...';
  }

  // 3. Vider localStorage et sessionStorage
  try { localStorage.clear(); } catch(e) {}
  try { sessionStorage.clear(); } catch(e) {}

  msg.textContent = 'Nettoyage terminé ! Redirection...';

  // 4. Rediriger vers la page de connexion après 2s
  setTimeout(function() {
    window.location.replace('index.html');
  }, 2000);
})();
</script>
</body>
</html>
