<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project inves'T - Créer un compte</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(ellipse at 50% 30%, #0d2a5e 0%, #05122b 40%, #020a18 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        #bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        #bg svg { width: 100%; height: 100%; }
        .wrapper { position: relative; z-index: 1; width: 100%; max-width: 460px; padding: 20px; }
        .box {
            background: rgba(10,42,94,0.45);
            backdrop-filter: blur(18px);
            border: 1px solid rgba(0,200,255,0.3);
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 0 60px rgba(0,200,255,0.1), 0 20px 60px rgba(0,0,0,0.5);
        }
        .logo-center { display: flex; justify-content: center; margin-bottom: 20px; }
        .divider-line { width: 60px; height: 2px; background: linear-gradient(90deg, transparent, #00c8ff, transparent); margin: 0 auto 15px; box-shadow: 0 0 8px rgba(0,200,255,0.5); }
        .page-title { text-align: center; color: #fff; font-size: 1.2rem; font-weight: 700; margin-bottom: 5px; }
        .page-subtitle { text-align: center; color: #a0d4f0; font-size: 0.88rem; margin-bottom: 25px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; color: #7ecfef; font-size: 0.82rem; margin-bottom: 7px; letter-spacing: 1px; text-transform: uppercase; }
        .form-group input {
            width: 100%; background: rgba(2,10,24,0.6);
            border: 1px solid rgba(0,200,255,0.3); border-radius: 8px;
            padding: 13px 16px; color: #fff; font-size: 0.95rem; outline: none; transition: all 0.3s;
        }
        .form-group input:focus { border-color: #00c8ff; box-shadow: 0 0 15px rgba(0,200,255,0.25); }
        .form-group input::placeholder { color: rgba(255,255,255,0.3); }
        .btn-register {
            width: 100%; padding: 15px;
            background: linear-gradient(135deg, #1a7fdb, #00c8ff);
            color: #020a18; font-size: 1rem; font-weight: 700;
            border: none; border-radius: 8px; cursor: pointer;
            letter-spacing: 2px; transition: all 0.3s; margin-top: 8px;
        }
        .btn-register:hover { background: linear-gradient(135deg, #00c8ff, #1a7fdb); box-shadow: 0 0 25px rgba(0,200,255,0.5); transform: translateY(-2px); }
        .btn-register:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .msg { display: none; border-radius: 8px; padding: 12px 16px; font-size: 0.9rem; text-align: center; margin-top: 15px; }
        .msg.error { background: rgba(255,50,50,0.15); border: 1px solid rgba(255,50,50,0.4); color: #ff6b6b; }
        .msg.success { background: rgba(0,200,100,0.15); border: 1px solid rgba(0,200,100,0.4); color: #4fffaa; }
        .login-link { text-align: center; margin-top: 20px; color: #7ecfef; font-size: 0.88rem; }
        .login-link a { color: #00c8ff; font-weight: 600; text-decoration: none; }
        .login-link a:hover { text-decoration: underline; }
        select {
            width: 100%; background: rgba(2,10,24,0.6);
            border: 1px solid rgba(0,200,255,0.3); border-radius: 8px;
            padding: 13px 16px; color: #fff; font-size: 0.95rem; outline: none;
            transition: all 0.3s; cursor: pointer; appearance: none;
        }
        select:focus { border-color: #00c8ff; box-shadow: 0 0 15px rgba(0,200,255,0.25); }
        select option { background: #0a2a5e; color: #fff; }
        .password-wrapper { position: relative; }
        .password-wrapper input { padding-right: 45px; }
        .eye-btn { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: #7ecfef; font-size: 1.1rem; padding: 0; }
        .phone-wrapper { display: flex; gap: 8px; }
        .phone-wrapper select { width: 140px; flex-shrink: 0; }
        .phone-wrapper input { flex: 1; }
    </style>
</head>
<body>

<div id="bg">
  <svg viewBox="0 0 1700 900" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
    <path d="M-100,300 C200,100 400,500 800,250 S1200,50 1700,300" fill="none" stroke="rgba(0,200,255,0.2)" stroke-width="2"/>
    <path d="M-100,600 C300,400 600,800 1000,550 S1400,300 1700,600" fill="none" stroke="rgba(26,127,219,0.25)" stroke-width="2"/>
    <circle cx="850" cy="450" r="300" fill="none" stroke="rgba(0,200,255,0.08)" stroke-width="1.5"/>
    <circle cx="200" cy="180" r="130" fill="none" stroke="rgba(0,200,255,0.15)" stroke-width="1.5"/>
    <circle cx="1500" cy="700" r="160" fill="none" stroke="rgba(26,127,219,0.2)" stroke-width="1.5"/>
    <circle cx="100" cy="80" r="2" fill="rgba(0,200,255,0.8)"/>
    <circle cx="500" cy="120" r="2.5" fill="rgba(0,200,255,0.9)"/>
    <circle cx="950" cy="30" r="2" fill="rgba(0,200,255,0.7)"/>
    <circle cx="1350" cy="40" r="2" fill="rgba(0,200,255,0.6)"/>
  </svg>
</div>

<div class="wrapper">
  <div class="box">
    <div class="logo-center">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 310 75" height="65" width="290">
        <defs><filter id="glow"><feGaussianBlur stdDeviation="2.5" result="coloredBlur"/><feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
        <path d="M 51,15 A 28,28 0 1,0 51,60" fill="none" stroke="#00c8ff" stroke-width="2.5" filter="url(#glow)"/>
        <path d="M 46,22 A 20,20 0 1,0 46,53" fill="none" stroke="#1a7fdb" stroke-width="1.2" opacity="0.6"/>
        <line x1="51" y1="15" x2="305" y2="15" stroke="#00c8ff" stroke-width="1.8" opacity="0.9" filter="url(#glow)"/>
        <line x1="51" y1="60" x2="305" y2="60" stroke="#1a9fff" stroke-width="1.8" opacity="0.9" filter="url(#glow)"/>
        <text x="20" y="44" font-family="Arial Black,sans-serif" font-size="23" font-weight="900" fill="#ffffff" filter="url(#glow)">P</text>
        <text x="57" y="47" font-family="Arial Black,sans-serif" font-size="28" font-weight="900" fill="#ffffff" letter-spacing="1">inves<tspan fill="#00c8ff" filter="url(#glow)">'T</tspan></text>
      </svg>
    </div>
    <div class="divider-line"></div>
    <p class="page-title">Créer un compte</p>
    <p class="page-subtitle">Rejoignez la communauté Project inves'T</p>

    <form onsubmit="register(event)">
      <div class="form-group">
        <label>Prénom &amp; Nom</label>
        <input type="text" id="fullname" placeholder="Ex: Jean Dupont" autocomplete="off"/>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="votre@email.com" autocomplete="off"/>
      </div>
      <div class="form-group">
        <label>Pays</label>
        <select id="country">
          <option value="">-- Sélectionnez votre pays --</option>
          <option value="France">🇫🇷 France</option>
          <option value="Belgique">🇧🇪 Belgique</option>
          <option value="Suisse">🇨🇭 Suisse</option>
          <option value="Canada">🇨🇦 Canada</option>
          <option value="Maroc">🇲🇦 Maroc</option>
          <option value="Algérie">🇩🇿 Algérie</option>
          <option value="Tunisie">🇹🇳 Tunisie</option>
          <option value="Sénégal">🇸🇳 Sénégal</option>
          <option value="Côte d'Ivoire">🇨🇮 Côte d'Ivoire</option>
          <option value="Cameroun">🇨🇲 Cameroun</option>
          <option value="Congo">🇨🇬 Congo</option>
          <option value="Autre">🌍 Autre</option>
        </select>
      </div>
      <div class="form-group">
        <label>Numéro de téléphone</label>
        <div class="phone-wrapper">
          <select id="phone-prefix">
            <option value="+33">🇫🇷 +33</option>
            <option value="+32">🇧🇪 +32</option>
            <option value="+41">🇨🇭 +41</option>
            <option value="+1">🇨🇦 +1</option>
            <option value="+212">🇲🇦 +212</option>
            <option value="+213">🇩🇿 +213</option>
            <option value="+216">🇹🇳 +216</option>
            <option value="+221">🇸🇳 +221</option>
            <option value="+225">🇨🇮 +225</option>
            <option value="+237">🇨🇲 +237</option>
            <option value="+242">🇨🇬 +242</option>
          </select>
          <input type="tel" id="phone" placeholder="6 12 34 56 78" autocomplete="off"/>
        </div>
      </div>
      <div class="form-group">
        <label>Mot de passe</label>
        <div class="password-wrapper">
          <input type="password" id="password" placeholder="Minimum 6 caractères"/>
          <button type="button" class="eye-btn" id="eye1" onclick="togglePwd('password','eye1')">🙈</button>
        </div>
      </div>
      <div class="form-group">
        <label>Confirmer le mot de passe</label>
        <div class="password-wrapper">
          <input type="password" id="confirm" placeholder="Répétez le mot de passe"/>
          <button type="button" class="eye-btn" id="eye2" onclick="togglePwd('confirm','eye2')">🙈</button>
        </div>
      </div>
      <button type="submit" class="btn-register" id="btn">CRÉER MON COMPTE</button>
      <div class="msg error" id="error-msg"></div>
      <div class="msg success" id="success-msg"></div>
    </form>

    <div class="login-link">
      Déjà un compte ? <a href="index.html">Se connecter</a>
    </div>
  </div>
</div>

<script>
  const _sb = window.supabase.createClient(
    'https://cvggxktybzbrtskcwlxp.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN2Z2d4a3R5YnpicnRza2N3bHhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyODM2MjcsImV4cCI6MjA4OTg1OTYyN30.cfHsAvmgcXYvedCz1fZCHlxOApupKCxnt8t9e8KzNBs'
  );

  function togglePwd(inputId, btnId) {
    const input = document.getElementById(inputId);
    const btn   = document.getElementById(btnId);
    if (input.type === 'password') {
      input.type = 'text';
      btn.textContent = '👁';
    } else {
      input.type = 'password';
      btn.textContent = '🙈';
    }
  }

  async function register(e) {
    e.preventDefault();
    const fullname = document.getElementById('fullname').value.trim();
    const email    = document.getElementById('email').value.trim();
    const country  = document.getElementById('country').value;
    const prefix   = document.getElementById('phone-prefix').value;
    const phone    = prefix + ' ' + document.getElementById('phone').value.trim();
    const password = document.getElementById('password').value;
    const confirm  = document.getElementById('confirm').value;
    const btn      = document.getElementById('btn');
    const errEl    = document.getElementById('error-msg');
    const succEl   = document.getElementById('success-msg');

    errEl.style.display  = 'none';
    succEl.style.display = 'none';

    if (!fullname || !email || !country || !phone || !password || !confirm) {
      errEl.textContent = 'Veuillez remplir tous les champs.';
      errEl.style.display = 'block'; return;
    }
    if (password.length < 6) {
      errEl.textContent = 'Le mot de passe doit contenir au moins 6 caractères.';
      errEl.style.display = 'block'; return;
    }
    if (password !== confirm) {
      errEl.textContent = 'Les mots de passe ne correspondent pas.';
      errEl.style.display = 'block'; return;
    }

    btn.disabled = true;
    btn.textContent = 'Création en cours...';

    const { data, error } = await _sb.auth.signUp({
      email,
      password,
      options: {
        data: { full_name: fullname, country: country, phone: phone },
        emailRedirectTo: window.location.origin + '/home.html'
      }
    });

    if (error) {
      errEl.textContent = 'Erreur : ' + error.message;
      errEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'CRÉER MON COMPTE';
    } else if (data && data.session) {
      // Session active immédiatement (confirmation email désactivée)
      succEl.textContent = '✅ Compte créé avec succès ! Redirection...';
      succEl.style.display = 'block';
      setTimeout(() => { window.location.href = 'home.html'; }, 1500);
    } else if (data && data.user) {
      // Email de confirmation envoyé
      succEl.textContent = '📧 Compte créé ! Vérifiez votre boîte email et cliquez sur le lien de confirmation pour accéder au site.';
      succEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'CRÉER MON COMPTE';
    } else {
      errEl.textContent = 'Une erreur inconnue est survenue. Réessayez.';
      errEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'CRÉER MON COMPTE';
    }
  }
</script>
